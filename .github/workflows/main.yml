name: Build Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 استنساخ المشروع
        uses: actions/checkout@v4

      - name: ☕ إعداد Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🐦 إعداد Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: 📦 تثبيت الحزم
        run: flutter pub get

      - name: 🔧 توليد منصة Android
        run: flutter create --platforms=android .

      - name: 🗑️ تنظيف كامل لـ Gradle Cache
        run: rm -rf ~/.gradle/caches/

      - name: ⚙️ حقن إعدادات Kotlin و AGP بالقوة (إعادة كتابة)
        run: |
          # 1. تعيين ext.kotlin_version في android/build.gradle
          echo "ext.kotlin_version = '1.9.24'" >> android/build.gradle
          
          # 2. تعيين classpath لـ Kotlin Plugin
          sed -i "s/classpath 'com.android.tools.build:gradle:.*'/classpath 'com.android.tools.build:gradle:8.3.2'/" android/build.gradle
          sed -i "s/classpath \"org.jetbrains.kotlin:kotlin-gradle-plugin:.*\"/classpath \"org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.24\"/" android/build.gradle
          
          # 3. تحديث settings.gradle (إن وجد) - حذف الإصدار القديم وكتابة الجديد
          if [ -f "android/settings.gradle" ]; then
            sed -i 's/id "org.jetbrains.kotlin.android" version ".*"/id "org.jetbrains.kotlin.android" version "1.9.24"/' android/settings.gradle
          fi
          
          # 4. ضبط compileSdk و targetSdk في android/app/build.gradle
          sed -i 's/compileSdk = .*/compileSdk = 35/' android/app/build.gradle
          sed -i 's/targetSdk = .*/targetSdk = 35/' android/app/build.gradle
          
          # 5. تحديث gradle-wrapper.properties إلى Gradle 8.6
          sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.6-all.zip|' android/gradle/wrapper/gradle-wrapper.properties

      - name: ✏️ إضافة أذونات الكاميرا والتخزين
        run: |
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          sed -i '/<application/i \
              <uses-permission android:name="android.permission.CAMERA" /> \
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" /> \
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' $MANIFEST_PATH

      - name: 🎨 نسخ أيقونة التطبيق (إن وجدت)
        run: |
          if [ -f "assets/icon.png" ]; then
            mkdir -p android/app/src/main/res/mipmap-hdpi
            mkdir -p android/app/src/main/res/mipmap-mdpi
            mkdir -p android/app/src/main/res/mipmap-xhdpi
            mkdir -p android/app/src/main/res/mipmap-xxhdpi
            mkdir -p android/app/src/main/res/mipmap-xxxhdpi
            cp assets/icon.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
            cp assets/icon.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
            cp assets/icon.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
            cp assets/icon.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
            cp assets/icon.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          fi

      - name: 🔐 صلاحيات تنفيذ gradlew
        run: chmod +x android/gradlew

      - name: 🧹 تنظيف Flutter
        run: flutter clean

      - name: 🔨 بناء APK Release
        run: flutter build apk --release

      - name: 📤 رفع APK
        uses: actions/upload-artifact@v4
        with:
          name: census2026-release
          path: build/app/outputs/flutter-apk/app-release.apk
