name: Build Nassim Final

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Preparation
        run: |
          flutter clean
          # السطر القادم هو الأهم: يوحد اسم المشروع مع اسم الحزمة لتفادي الخروج المفاجئ
          flutter create . --platforms android --org com.example --project-name census2026 --overwrite
          
          # إضافة الصلاحيات لملف المانيفست
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.CAMERA" />' $MANIFEST
          
          # السماح بمرور بيانات الـ HTML
          sed -i 's/<application/<application android:usesCleartextTraffic="true"/' $MANIFEST

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Census_2026_Final_Fix
          path: build/app/outputs/flutter-apk/app-release.apk
          
