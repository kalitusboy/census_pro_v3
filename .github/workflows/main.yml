name: Build Census 2026 APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Verify assets
        run: |
          if [ ! -f assets/app.html ]; then
            echo "❌ ERROR: assets/app.html not found!"
            exit 1
          fi
          echo "✅ assets/app.html exists."

      - name: Inject permissions into AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # أضف الصلاحيات قبل وسوم <application>
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.CAMERA" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" />' $MANIFEST
          # السماح بحركة المرور غير المشفرة (لـ WebView المحلي)
          sed -i 's/<application/<application android:usesCleartextTraffic="true"/' $MANIFEST
          echo "✅ Permissions and cleartext traffic added."

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Census2026-Release
          path: build/app/outputs/flutter-apk/app-release.apk
