name: Build APK (WebView Census)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Install dependencies
        run: flutter pub get

      - name: Create Android
        run: flutter create .

      # ✅ إضافة الأذونات بطريقة آمنة (بدون تخريب YAML)
      - name: Add permissions
        run: |
          FILE=android/app/src/main/AndroidManifest.xml

          awk '/<manifest/{print;print "    <uses-permission android:name=\"android.permission.CAMERA\"/>";print "    <uses-permission android:name=\"android.permission.READ_EXTERNAL_STORAGE\"/>";print "    <uses-permission android:name=\"android.permission.WRITE_EXTERNAL_STORAGE\"/>";next}1' $FILE > temp.xml

          mv temp.xml $FILE

      - name: Clean
        run: flutter clean

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: census-apk
          path: build/app/outputs/flutter-apk/app-release.apk
