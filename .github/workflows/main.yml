name: Build Census 2026 APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'      # ← محدث إلى إصدار مستقر (v1 embedding محذوف)
          channel: 'stable'

      - name: Verify assets
        run: |
          if [ ! -f assets/app.html ]; then
            echo "❌ ERROR: assets/app.html not found!"
            exit 1
          fi
          echo "✅ assets/app.html exists."

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Census2026-Release
          path: build/app/outputs/flutter-apk/app-release.apk
