name: Build Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # يسمح بالتشغيل اليدوي من واجهة GitHub

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 استنساخ المشروع
        uses: actions/checkout@v4

      - name: ☕ إعداد Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🐦 إعداد Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'  # يمكنك تغيير الإصدار حسب حاجتك
          channel: 'stable'

      - name: 📦 تثبيت الحزم
        run: flutter pub get

      - name: 🔧 توليد منصة Android (إذا لم تكن موجودة)
        run: flutter create --platforms=android .

      - name: 🔨 بناء APK (Release)
        run: flutter build apk --release

      - name: 📤 رفع APK للتحميل
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
